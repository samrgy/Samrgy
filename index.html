<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saammrgy | Portfolio</title>
    <style>
        :root {
            --bg: #000000;
            --deep-green: #073322;
            --neon: #00ff88;
            --glass: rgba(7, 51, 34, 0.2);
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            /* Infinite edge gradient */
            background-image: radial-gradient(circle at 50% -10%, var(--deep-green), transparent 70%);
            background-attachment: fixed;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Scroll Reveal Animation Classes */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .pfp {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin: 0;
            font-weight: 800;
        }

        .section-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--neon);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
            font-weight: 700;
        }

        /* Nav Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 18px 22px;
            border-radius: 18px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--deep-green);
            border-color: var(--neon);
            transform: scale(1.02);
        }

        .btn:active { transform: scale(0.97); }

        .btn span { font-size: 0.9rem; }
        .btn i { opacity: 0.5; font-style: normal; }

        /* AniList Stats Styling */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 12px 5px;
            border-radius: 15px;
        }

        .stat-num {
            display: block;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--neon);
        }

        .stat-label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="reveal">
            <img src="IMG_5132.png" class="pfp" alt="saammrgy">
            <h1>saammrgy</h1>
        </header>

        <div class="section-card reveal">
            <span class="section-title">Projects</span>
            <a href="https://vt.tiktok.com/ZSu7kPJFP/" target="_blank" class="btn">
                <span>CPU ON MINECRAFT</span>
                <i>→</i>
            </a>
            <a href="https://vt.tiktok.com/ZSu7kGJQj/" target="_blank" class="btn">
                <span>16-BITS CALCULATOR ON MINECRAFT</span>
                <i>→</i>
            </a>
            <a href="https://vt.tiktok.com/ZSu7kcQMg/" target="_blank" class="btn">
                <span>8-BITS CALCULATOR ON MINECRAFT</span>
                <i>→</i>
            </a>
        </div>

        <div class="section-card reveal">
            <span class="section-title">Instagram</span>
            <a href="https://www.instagram.com/p/DBodLZhg4T3/" target="_blank" class="btn">
                <span>boys abyss</span>
                <i>📸</i>
            </a>
            <a href="https://www.instagram.com/p/C-_QNm3ALx7/" target="_blank" class="btn">
                <span>goodnight punpun</span>
                <i>📸</i>
            </a>
            <a href="https://www.instagram.com/saammrgy/" target="_blank" class="btn">
                <span>view full profile</span>
                <i>🔗</i>
            </a>
        </div>

        <div class="section-card reveal">
            <span class="section-title">Anilist Status</span>
            
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-num">112</span>
                    <span class="stat-label">Anime</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">48</span>
                    <span class="stat-label">Manga</span>
                </div>
                <div class="stat-item">

            <a href="https://anilist.co/user/samrgy/animelist" target="_blank" class="btn" style="background: var(--neon); color: #000; border: none;">
                <span style="font-weight: 800;">Full AniList Database</span>
            </a>
        </div>

        <footer>
            CONNECTION ESTABLISHED // 2026
        </footer>
    </div>

    <script>
        // Apple-style Scroll Reveal Script
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach((el) => {
            observer.observe(el);
        });
    </script>
</body>
</html>
